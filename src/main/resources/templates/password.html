<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>修改密碼 - MiniClinic</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 400px; margin: 50px auto; padding: 20px; background-color: #f4f7f6; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #0F2443; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #64748B; }
        input { width: 100%; padding: 10px; border: 1px solid #E2E8F0; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #14B8A6; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0D9488; }
        .error { color: #e11d48; font-size: 14px; margin-bottom: 15px; }
        .info { color: #64748B; margin-bottom: 20px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>修改密碼</h2>
        <p class="info">目前醫師：<strong th:text="${loggedInDoctorName}">醫師</strong></p>
        
        <div th:if="${errorMessage}" class="error" th:text="${errorMessage}"></div>

        <form th:action="@{/password}" th:object="${passwordForm}" method="post">
            <div class="form-group">
                <label>舊密碼</label>
                <input type="password" th:field="*{oldPassword}" required>
            </div>
            <div class="form-group">
                <label>新密碼 (至少 8 碼)</label>
                <input type="password" th:field="*{newPassword}" required>
            </div>
            <div class="form-group">
                <label>確認新密碼</label>
                <input type="password" th:field="*{confirmPassword}" required>
            </div>
            <button type="submit">確認修改</button>
        </form>
        <p style="text-align: center; margin-top: 15px;">
            <a th:href="@{/dashboard}" style="color: #64748B; text-decoration: none; font-size: 14px;">返回儀表板</a>
        </p>
    </div>
</body>
</html>
