spring.application.name=miniclinic
server.port=8080
logging.level.tw.edu.ntub.imd.miniclinic=DEBUG

# 確保 data.sql 以 UTF-8 讀取（Windows 預設編碼為 CP950，會造成中文亂碼）
spring.sql.init.encoding=UTF-8

# SQLite 資料庫檔案位置（專案根目錄）
spring.datasource.url=jdbc:sqlite:miniclinic.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Hibernate 使用 SQLite 的方言
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

# 啟動時自動建立/更新資料表結構
spring.jpa.hibernate.ddl-auto=update

# 顯示執行的 SQL（開發時很有用）
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 強制執行 data.sql（即使不是內嵌資料庫）
spring.sql.init.mode=always

# 確保在 Hibernate 初始化（建立表）後才執行 data.sql
spring.jpa.defer-datasource-initialization=true

# 關閉樣板快取，修改 HTML 後重新整理網頁即可看到效果
spring.thymeleaf.cache=false